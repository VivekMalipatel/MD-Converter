apiVersion: apps/v1
kind: Deployment
metadata:
  name: md-converter
  namespace: services
  labels:
    app: md-converter
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: md-converter
  template:
    metadata:
      labels:
        app: md-converter
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values: ["amd64"]
      containers:
        - name: md-converter
          image: ghcr.io/vivekmalipatel/md-converter:sha-5d3898d
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: backend
          image: ghcr.io/vivekmalipatel/md-converter-backend:sha-5d3898d
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: md-converter
  namespace: services
spec:
  selector:
    app: md-converter
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: md-converter
  namespace: kube-system
  annotations:
    external-dns.alpha.kubernetes.io/target: "96.84.67.209"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`mdconverter.vivekmalipatel.com`)
      kind: Rule
      middlewares:
        - name: security-headers
          namespace: kube-system
        - name: crowdsec-bouncer
          namespace: kube-system
        - name: geo-allow-us-in
          namespace: kube-system
      services:
        - name: md-converter
          namespace: services
          passHostHeader: true
          port: 3000
  tls: {}
